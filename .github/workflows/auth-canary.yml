name: Auth Canary

on:
  schedule:
    # Enough for prod signal without alert fatigue (was every 5m).
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: auth-canary
  cancel-in-progress: true

jobs:
  auth-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AUTH_CANARY_BASE_URL: ${{ secrets.AUTH_CANARY_BASE_URL }}
      OPS_ALERT_WEBHOOK_URL: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
      OPS_ALERT_WEBHOOK_KIND: ${{ secrets.OPS_ALERT_WEBHOOK_KIND }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run auth canary
        run: node scripts/checks/check-auth-health.mjs
