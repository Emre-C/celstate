name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Match Vercel Preview/Production: every PUBLIC_* used via $env/static/public must exist at build time.
      # Placeholders only — not real deployments (see docs/runbooks/PUBLIC-ENV-CHECKLIST.md).
      # Must match vite preview origin so canonical redirects do not leave localhost during E2E (see playwright.config.ts).
      PUBLIC_SITE_URL: http://127.0.0.1:4174
      PUBLIC_CONVEX_URL: https://celstate-ci-placeholder.convex.cloud
      PUBLIC_POSTHOG_KEY: phc_ci_placeholder
      PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
      # Clerk Auth — placeholder shapes only (`vite preview` + E2E load `hooks.server.ts`).
      CLERK_SECRET_KEY: sk_test_ci_placeholder_000000000000000000000000
      PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder_000000000000000000000000
      CLERK_JWT_ISSUER_DOMAIN: https://clerk.ci-placeholder.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install chromium --with-deps

      - name: Auth regression suite
        run: pnpm test:auth

      - name: Verify (public env, typecheck, knip, dupcheck, eslint, test, build)
        run: pnpm verify
