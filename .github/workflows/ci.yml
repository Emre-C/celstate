name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Match Vercel Preview/Production: every PUBLIC_* used via $env/static/public must exist at build time.
      # Placeholders only — not real deployments (see docs/runbooks/PUBLIC-ENV-CHECKLIST.md).
      PUBLIC_SITE_URL: https://celstate-ci.invalid
      PUBLIC_CONVEX_URL: https://celstate-ci-placeholder.convex.cloud
      PUBLIC_POSTHOG_KEY: phc_ci_placeholder
      PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify (public env, typecheck, knip, dupcheck, eslint, test, build)
        run: pnpm verify
