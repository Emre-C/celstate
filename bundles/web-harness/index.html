<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Celstate Living Controls — web runtime harness</title>
    <style>
      :root {
        --bg: #f5f3ed;
        --surface: #faf8f4;
        --border: #e2ded6;
        --accent: #c2410c;
        --text: #1c1917;
        --dim: #78716c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        padding: 40px;
      }
      h1 { font-size: 22px; margin: 0 0 4px; }
      .meta { color: var(--dim); font-size: 13px; margin: 0 0 28px; }
      #fps {
        position: fixed; top: 12px; right: 16px; background: var(--text); color: #fff;
        padding: 4px 10px; border-radius: 6px; font: 600 13px ui-monospace, monospace;
      }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; max-width: 760px; }
      .panel {
        background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
        padding: 28px; display: flex; flex-direction: column; align-items: center;
        gap: 18px; min-height: 180px; justify-content: center;
      }
      .tag { color: var(--dim); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

      /* Living button + foliage surround */
      .btn-wrap { position: relative; width: 200px; height: 64px; display: flex; align-items: center; justify-content: center; }
      #foliageBack { position: absolute; inset: 6px 8px 2px; border-radius: 18px; background: rgba(194,65,12,0.18); }
      #foliageFront { position: absolute; right: 16px; bottom: 4px; width: 26px; height: 10px; border-radius: 8px; background: rgba(194,65,12,0.30); }
      #livingBtn, .static-btn {
        position: relative; min-width: 170px; min-height: 50px; border-radius: 14px;
        background: var(--accent); color: #fff; border: none; font-size: 16px; font-weight: 600;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        box-shadow: 0 4px 8px rgba(28,25,23,0.18); will-change: transform;
      }

      /* Slider */
      .slider { width: 296px; }
      .rail-area { position: relative; height: 28px; display: flex; align-items: center; cursor: pointer; }
      .rail { height: 6px; border-radius: 3px; background: var(--border); width: 100%; }
      #livingFill, .static-fill { position: absolute; height: 6px; border-radius: 3px; background: var(--accent); left: 0; }
      #livingThumb, .static-thumb {
        position: absolute; left: 0; width: 28px; height: 28px; border-radius: 14px;
        background: var(--surface); border: 2px solid var(--accent); will-change: transform;
        box-shadow: 0 2px 4px rgba(28,25,23,0.2);
      }
      .static-thumb { left: 50%; margin-left: -14px; }
      .static-fill { width: 50%; }
      .val { color: var(--dim); font: 600 12px ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <div id="fps">— fps</div>
    <h1>Celstate Living Controls — web runtime harness</h1>
    <p class="meta">Renders the real <code>@celstate/living-ui-runtime</code> pure core (buttonTransform / ambientBreath / thumbXForValue). Living vs static, for visible feel and measured frame rate.</p>

    <div class="grid">
      <div class="panel">
        <span class="tag">Living button</span>
        <div class="btn-wrap">
          <div id="foliageBack"></div>
          <button id="livingBtn">Generate</button>
          <div id="foliageFront"></div>
        </div>
      </div>
      <div class="panel">
        <span class="tag">Static button</span>
        <div class="static-btn">Generate</div>
      </div>

      <div class="panel">
        <span class="tag">Living slider · <span id="sliderVal" class="val">0.500</span></span>
        <div class="slider">
          <div id="livingRail" class="rail-area">
            <div class="rail"></div>
            <div id="livingFill"></div>
            <div id="livingThumb"></div>
          </div>
        </div>
      </div>
      <div class="panel">
        <span class="tag">Static slider</span>
        <div class="slider">
          <div class="rail-area">
            <div class="rail"></div>
            <div class="static-fill"></div>
            <div class="static-thumb"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./harness.mjs"></script>
  </body>
</html>
